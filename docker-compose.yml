services:
  app:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - sqlite_data:/app/apps/api/storage

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/nodehubsapi;
      /usr/bin/mc anonymous set none local/nodehubsapi;
      "

volumes:
  sqlite_data:
  minio_data:
